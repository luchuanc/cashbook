services:
  main:
    container_name: cashbook4_local
    depends_on: 
      - db
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    volumes:
      - ./data:/app/data
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@cashbook_db_local:5432/cashbook?schema=public"
      NUXT_DATA_PATH: "/app/data"
      NUXT_AUTH_SECRET: "auth_secret" 
      NUXT_ADMIN_USERNAME: "admin"
      NUXT_ADMIN_PASSWORD: "ab062b3df8b84086facf5b435839f95f5b49045e0a12749d79d7f166dcb4c9c6"
    ports:
      - 9090:9090
  db:
    container_name: cashbook_db_local
    image: postgres:17.4-alpine3.21
    restart: always
    shm_size: 128mb
    volumes:
      - ./db:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cashbook
